<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Topic Radar - Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0B0D14; --bg-side: #080A10; --bg-hover: #12151F;
      --border: #1E2235; --text: #C9D1D9; --muted: #636E82;
      --accent: #E8A03D; --accent-bg: rgba(232,160,61,0.10);
      --user-bg: #1A2332; --bot-bg: #141925;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    #config-page { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .config-card { background: var(--bg-side); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 420px; }
    .config-card h2 { font-size: 18px; margin-bottom: 20px; color: var(--accent); }
    .config-card label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .config-card select, .config-card input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
    .config-card select:focus, .config-card input:focus { outline: none; border-color: var(--accent); }
    .config-card button { width: 100%; padding: 10px; margin-top: 20px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .config-card button:hover { opacity: 0.9; }
    .config-card .status { margin-top: 12px; font-size: 12px; color: var(--muted); }

    #chat-page { display: none; height: 100vh; flex-direction: column; }
    #chat-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 44px; background: var(--bg-side); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #chat-header h3 { font-size: 13px; display: flex; align-items: center; gap: 8px; }
    #chat-header h3::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    #chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg { margin-bottom: 12px; max-width: 85%; line-height: 1.6; font-size: 14px; }
    .msg.user { margin-left: auto; background: var(--user-bg); border-radius: 12px 12px 4px 12px; padding: 10px 14px; }
    .msg.bot { background: var(--bot-bg); border-radius: 12px 12px 12px 4px; padding: 10px 14px; }
    .msg.bot p { margin: 0 0 8px; }
    .msg.bot p:last-child { margin-bottom: 0; }
    .msg.bot code { background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 3px; font-size: 13px; }
    .msg.bot strong { color: var(--accent); }
    .msg .citation { font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border); }
    .msg .citation:hover { text-decoration: underline; }
    #chat-input-area { display: flex; gap: 8px; padding: 12px; background: var(--bg-side); border-top: 1px solid var(--border); flex-shrink: 0; }
    #chat-input { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; resize: none; font-family: inherit; line-height: 1.4; }
    #chat-input:focus { outline: none; border-color: var(--accent); }
    #chat-send { padding: 8px 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
    #chat-send:hover { opacity: 0.9; }
    #chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .loading { color: var(--muted); font-size: 12px; }
    .loading::after { content: ''; animation: dots 1.5s steps(4) infinite; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
  </style>
</head>
<body>
  <div id="config-page">
    <div class="config-card">
      <h2>AI Topic Radar Agent</h2>
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px">首次使用，请配置 LLM 和 Neo4j 连接信息</p>
      <label>LLM Provider</label>
      <select id="cfg-provider">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="deepseek">DeepSeek</option>
      </select>
      <label>API Key</label>
      <input type="password" id="cfg-apikey" placeholder="sk-...">
      <label>Neo4j URI</label>
      <input type="text" id="cfg-neo4j" value="bolt://localhost:7687">
      <label>Neo4j Password</label>
      <input type="password" id="cfg-neo4j-pw" value="password">
      <button onclick="saveConfig()">保存并启动</button>
      <div class="status" id="config-status"></div>
    </div>
  </div>

  <div id="chat-page">
    <div id="chat-header">
      <h3>AI Agent</h3>
      <span style="font-size:11px;color:var(--muted)">Neo4j Graph RAG</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="chat-send" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const chatHistory = [];

    fetch('/health').then(r => r.json()).then(d => {
      if (d.configured) showChat(); else showConfig();
    }).catch(() => showConfig());

    function showConfig() { document.getElementById('config-page').style.display = 'flex'; document.getElementById('chat-page').style.display = 'none'; }
    function showChat() { document.getElementById('config-page').style.display = 'none'; document.getElementById('chat-page').style.display = 'flex'; appendMessage('bot', '你好！我是 AI 选题助手。我可以帮你分析 AI 领域的热点趋势、推荐选题、查询话题关系。请问有什么可以帮你的？'); }

    async function saveConfig() {
      const data = {
        provider: document.getElementById('cfg-provider').value,
        api_key: document.getElementById('cfg-apikey').value,
        neo4j_uri: document.getElementById('cfg-neo4j').value,
        neo4j_password: document.getElementById('cfg-neo4j-pw').value,
      };
      document.getElementById('config-status').textContent = '保存中...';
      try {
        const res = await fetch('/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
        const result = await res.json();
        if (result.status === 'ok') {
          document.getElementById('config-status').textContent = '配置已保存。请重启服务后刷新页面。';
        } else {
          document.getElementById('config-status').textContent = '错误: ' + (result.error || 'unknown');
        }
      } catch(e) {
        document.getElementById('config-status').textContent = '连接失败: ' + e.message;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      document.getElementById('chat-send').disabled = true;

      appendMessage('user', message);
      chatHistory.push({role: 'user', content: message});

      const loadingEl = appendLoading();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message, history: chatHistory.slice(-10)}),
        });
        const data = await res.json();
        loadingEl.remove();

        if (data.error) {
          appendMessage('bot', '错误: ' + data.error);
        } else {
          appendMessage('bot', data.answer, data.citations);
          chatHistory.push({role: 'assistant', content: data.answer});
        }
      } catch(e) {
        loadingEl.remove();
        appendMessage('bot', '请求失败: ' + e.message);
      }
      document.getElementById('chat-send').disabled = false;
    }

    function appendMessage(role, content, citations) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'bot') {
        div.innerHTML = marked.parse(content);
      } else {
        div.textContent = content;
      }
      if (citations && citations.length) {
        const citDiv = document.createElement('div');
        citDiv.className = 'citation';
        citDiv.textContent = '引用: ' + citations.map(c => c.date + '/' + c.source).join(', ');
        div.appendChild(citDiv);
      }
      const container = document.getElementById('chat-messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    function appendLoading() {
      const div = document.createElement('div');
      div.className = 'msg bot loading';
      div.textContent = '思考中';
      document.getElementById('chat-messages').appendChild(div);
      document.getElementById('chat-messages').scrollTop = 99999;
      return div;
    }
  </script>
</body>
</html>
