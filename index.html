<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📡 AI Topic Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="alternate" type="application/rss+xml" title="AI Topic Radar RSS" href="./feed.xml">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root {
      --bg:         #0B0D14;
      --bg-side:    #080A10;
      --bg-hover:   #12151F;
      --bg-active:  #1A1E2E;
      --border:     #1E2235;
      --text:       #C9D1D9;
      --muted:      #636E82;
      --dim:        #2E3547;
      --accent:     #E8A03D;
      --accent-bg:  rgba(232,160,61,0.10);
      --code-bg:    #0D1017;
      --link:       #79B8FF;
    }
    [data-theme="light"] {
      --bg:         #FAFBFC;
      --bg-side:    #F0F2F5;
      --bg-hover:   #E8ECF1;
      --bg-active:  #DDE3EA;
      --border:     #D2D8E0;
      --text:       #1C1E26;
      --muted:      #5A6678;
      --dim:        #B8C2D0;
      --accent:     #B57200;
      --accent-bg:  rgba(181,114,0,0.08);
      --code-bg:    #F0F2F5;
      --link:       #0451A5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 50px;
      background: var(--bg-side); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand { font-size: 14px; font-weight: 700; letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 18px; animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .brand em { color: var(--accent); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .signal {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .hdr-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 10px; letter-spacing: 0.06em;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      transition: border-color 0.15s, color 0.15s;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hdr-btn.icon-only { padding: 4px 7px; }
    .hdr-btn svg { display: block; }

    /* ── Body ── */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--bg-side); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 10px 0;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
    .side-label {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dim); padding: 4px 16px 10px;
    }
    .search-wrap { padding: 0 12px 10px; }
    #searchInput {
      width: 100%; height: 28px; padding: 0 9px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 11px;
    }
    #searchInput:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }
    #searchStatus {
      min-height: 14px; margin-top: 4px;
      font-size: 9px; letter-spacing: 0.04em; color: var(--dim);
    }
    /* ── Month group ── */
    .month-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 0.15s; user-select: none;
    }
    .month-hdr:hover { color: var(--muted); }
    .month-hdr.lit { color: var(--accent); }
    .month-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .month-group.open .month-body { max-height: 9999px; }
    .month-group.open > .month-hdr .arr { transform: rotate(90deg); }

    .date-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 14px 5px 22px; cursor: pointer;
      font-size: 13px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.04em; transition: color 0.15s; user-select: none;
    }
    .date-hdr:hover { color: var(--text); }
    .date-hdr.lit { color: var(--accent); }
    .date-hdr.search-hit {
      color: var(--accent);
      background: linear-gradient(90deg, var(--accent-bg), transparent);
    }
    .arr { font-size: 8px; transition: transform 0.2s; display: inline-block; }
    .date-group.open .arr { transform: rotate(90deg); }
    .rpt-list { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .date-group.open .rpt-list { max-height: 600px; }
    .rpt-btn {
      display: block; width: 100%; padding: 5px 14px 5px 26px;
      background: none; border: none; border-left: 2px solid transparent;
      text-align: left; cursor: pointer; font-family: inherit; font-size: 13px;
      color: var(--muted); transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .rpt-btn:hover { background: var(--bg-hover); color: var(--text); }
    .rpt-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); }
    .rpt-row { display: flex; align-items: center; padding: 5px 14px 5px 26px; }
    .rpt-label { flex: 1; font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lang-btns { display: flex; gap: 3px; flex-shrink: 0; }
    .lang-btn {
      background: none; border: 1px solid var(--dim); color: var(--dim);
      padding: 2px 7px; border-radius: 3px; cursor: pointer;
      font-family: inherit; font-size: 11px; letter-spacing: 0.06em;
      transition: border-color 0.1s, color 0.1s;
    }
    .lang-btn:hover { border-color: var(--muted); color: var(--muted); }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ── Content ── */
    #cwrap { flex: 1; overflow-y: auto; }
    #cwrap::-webkit-scrollbar { width: 5px; }
    #cwrap::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
    #content { max-width: 820px; margin: 0 auto; padding: 36px 48px 72px; }

    .msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
      height: 240px; color: var(--muted); font-size: 11px; letter-spacing: 0.05em;
    }
    .msg-icon { font-size: 36px; opacity: 0.35; }

    @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .fade { animation: fadein 0.3s ease; }

    /* ── Markdown ── */
    .md {
      font-family: 'Source Serif 4', Georgia, 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 16px; line-height: 1.8; color: var(--text);
    }
    .md h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; line-height: 1.3; letter-spacing: -0.02em; }
    .md h2 { font-size: 17px; font-weight: 600; margin: 30px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; }
    .md h4 { font-size: 13px; font-weight: 700; margin: 16px 0 6px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.03em; }
    .md p { margin-bottom: 12px; }
    .md a { color: var(--link); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md strong { font-weight: 600; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .md ul, .md ol { padding-left: 22px; margin-bottom: 12px; }
    .md li { margin-bottom: 4px; }
    .md li > ul, .md li > ol { margin-top: 4px; margin-bottom: 0; }
    .md blockquote { border-left: 3px solid var(--accent); padding: 6px 16px; margin: 12px 0; color: var(--muted); font-style: italic; }
    .md code {
      font-family: 'Space Mono', monospace; font-size: 12.5px;
      background: var(--code-bg); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 3px;
    }
    .md pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; overflow-x: auto; margin: 14px 0; }
    .md pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .md table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; font-family: 'Space Mono', monospace; }
    .md th { background: var(--code-bg); border: 1px solid var(--border); padding: 7px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .md td { border: 1px solid var(--border); padding: 7px 12px; vertical-align: top; }
    .md tr:nth-child(even) td { background: var(--bg-hover); }
    .md details { border: 1px solid var(--border); border-radius: 6px; margin: 10px 0; overflow: hidden; }
    .md summary {
      cursor: pointer; padding: 8px 14px;
      font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
      background: var(--code-bg); user-select: none; list-style: none;
      display: flex; align-items: center; gap: 8px; transition: color 0.15s;
    }
    .md summary::-webkit-details-marker { display: none; }
    .md summary::before { content: '▶'; font-size: 8px; flex-shrink: 0; }
    .md details[open] summary::before { content: '▼'; }
    .md summary:hover { color: var(--text); }
    .md details > *:not(summary) { padding: 12px 14px; }

    /* ── Chat Panel ── */
    #chatPanel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 400px; max-width: 90vw;
      background: var(--bg-side); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 1000;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -8px 0 32px rgba(0,0,0,0.3);
    }
    #chatPanel.open { transform: translateX(0); }
    #chatOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.25); opacity: 0;
      pointer-events: none; transition: opacity 0.25s;
    }
    #chatOverlay.open { opacity: 1; pointer-events: auto; }

    #chatHeader {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #chatHeader .chat-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    #chatHeader .chat-title .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
    }
    .chat-close {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 18px; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
    }
    .chat-close:hover { color: var(--text); background: var(--bg-hover); }

    #chatMessages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #chatMessages::-webkit-scrollbar { width: 4px; }
    #chatMessages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .chat-msg {
      max-width: 88%; padding: 10px 14px;
      border-radius: 12px; font-size: 13px; line-height: 1.6;
      word-wrap: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--accent-bg); border: 1px solid rgba(232,160,61,0.25);
      color: var(--text);
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: var(--bg-hover); border: 1px solid var(--border);
      color: var(--text);
    }
    .chat-msg.assistant .md { font-size: 13px; line-height: 1.6; }
    .chat-msg.assistant .md h1, .chat-msg.assistant .md h2 { font-size: 14px; margin: 8px 0 4px; }
    .chat-msg.assistant .md h3 { font-size: 13px; margin: 6px 0 3px; }
    .chat-msg.assistant .md p { margin-bottom: 6px; }
    .chat-msg.assistant .md ul, .chat-msg.assistant .md ol { padding-left: 18px; margin-bottom: 6px; }
    .chat-msg.assistant .md pre { font-size: 11px; padding: 10px; margin: 6px 0; }
    .chat-msg.assistant .md code { font-size: 11px; }
    .chat-msg.assistant .md a { color: var(--link); }

    .chat-citations {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--border); font-size: 11px;
    }
    .chat-citations .cit-label {
      font-size: 10px; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .chat-cit-link {
      display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0;
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 4px; color: var(--link); font-size: 10px;
      text-decoration: none; cursor: pointer; transition: border-color 0.15s;
    }
    .chat-cit-link:hover { border-color: var(--accent); }

    .chat-typing {
      align-self: flex-start; padding: 10px 14px;
      font-size: 13px; color: var(--muted);
    }
    .chat-typing .dots span {
      animation: blink 1.4s infinite both;
    }
    .chat-typing .dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing .dots span:nth-child(3) { animation-delay: 0.4s; }

    #chatInputWrap {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #chatInput {
      flex: 1; height: 36px; padding: 0 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    #chatInput:focus { border-color: var(--accent); }
    #chatInput::placeholder { color: var(--dim); }
    #chatSend {
      width: 36px; height: 36px; border: none; border-radius: 8px;
      background: var(--accent); color: var(--bg);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; transition: opacity 0.15s;
    }
    #chatSend:hover { opacity: 0.85; }
    #chatSend:disabled { opacity: 0.4; cursor: not-allowed; }

    .chat-welcome {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .chat-welcome .icon { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }
    .chat-welcome p { font-size: 12px; line-height: 1.6; }
    .chat-welcome .suggestions {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center; margin-top: 16px;
    }
    .chat-suggestion {
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 16px; background: var(--bg);
      color: var(--muted); font-size: 11px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chat-suggestion:hover { border-color: var(--accent); color: var(--accent); }

    .hdr-btn.chat-active { border-color: var(--accent); color: var(--accent); }

    /* ── Mobile ── */
    #mob-toggle { display: none; }
    @media (max-width: 680px) {
      #hdr { padding: 0 12px; }
      .hdr-right { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .hdr-btn { padding: 4px 8px; }
      .hdr-join { display: none; }
      .hdr-icon { display: none; }
      #rssLink { display: none; }
      body { overflow: auto; }
      #app { height: auto; min-height: 100vh; }
      #body { flex-direction: column; overflow: visible; }
      #cwrap { overflow: visible; }
      #sidebar {
        width: 100%; border-right: none; border-bottom: 1px solid var(--border);
        max-height: 48px; overflow: hidden; padding: 0;
        transition: max-height 0.3s ease;
      }
      #sidebar.open { max-height: 60vh; overflow-y: auto; padding: 0 0 8px; }
      #mob-toggle {
        display: flex; align-items: center; gap: 8px;
        height: 48px; padding: 0 16px; cursor: pointer;
        font-size: 11px; color: var(--muted); border-bottom: 1px solid transparent;
        transition: color 0.15s;
      }
      #mob-toggle:hover { color: var(--text); }
      #sidebar.open #mob-toggle { border-bottom-color: var(--border); }
      .side-label { margin-top: 8px; }
      #content { padding: 20px 16px 48px; }
      .md { font-size: 15px; }

      /* Chat panel full width on mobile */
      #chatPanel { width: 100%; max-width: 100%; }
      #chatBtn .hdr-label { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="brand">
      <span class="brand-icon">📡</span>
      <span>AI Topic <em>Radar</em></span>
    </div>
    <div class="hdr-right">
      <div class="signal"></div>
      <a class="hdr-btn icon-only" href="https://github.com/Conradgui/AI-TREND-RADAR" target="_blank" rel="noopener noreferrer" title="GitHub" aria-label="GitHub">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
      <a id="rssLink" class="hdr-btn" href="./feed.xml" title="RSS Feed"><span class="hdr-icon">⊕</span>RSS</a>
      <button id="chatBtn" class="hdr-btn" onclick="toggleChat()" title="AI Agent 对话">
        <span class="hdr-icon">🤖</span><span class="hdr-label">AGENT</span>
      </button>
      <button id="themeBtn" class="hdr-btn"><span class="hdr-icon">◐</span><span class="hdr-label">LIGHT</span></button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div id="mob-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        ☰ &nbsp;选择报告
      </div>
      <div class="side-label">REPORTS</div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="搜索全文，如 Claude">
        <div id="searchStatus"></div>
      </div>
      <div id="nav"></div>
    </div>

    <div id="cwrap">
      <div id="content">
        <div class="msg"><div class="msg-icon">📡</div><div>正在加载…</div></div>
      </div>
    </div>
  </div>

  <!-- Chat Overlay -->
  <div id="chatOverlay" onclick="toggleChat()"></div>

  <!-- Chat Panel -->
  <div id="chatPanel">
    <div id="chatHeader">
      <div class="chat-title"><span class="dot"></span>AI Agent</div>
      <button class="chat-close" onclick="toggleChat()" title="关闭">✕</button>
    </div>
    <div id="chatMessages">
      <div class="chat-welcome">
        <div class="icon">🤖</div>
        <p>你好！我是 AI Topic Radar 的智能助手，<br>可以帮你分析 AI 趋势和选题建议。</p>
        <div class="suggestions">
          <div class="chat-suggestion" onclick="sendSuggestion(this)">最近有什么热门趋势？</div>
          <div class="chat-suggestion" onclick="sendSuggestion(this)">推荐值得深挖的选题</div>
          <div class="chat-suggestion" onclick="sendSuggestion(this)">Claude 最近有什么动态？</div>
        </div>
      </div>
    </div>
    <div id="chatInputWrap">
      <input id="chatInput" type="text" placeholder="输入消息…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}">
      <button id="chatSend" onclick="sendChatMessage()" title="发送">➤</button>
    </div>
  </div>
</div>

<script>
marked.use({ breaks: true, gfm: true });

// Allow <details> and <summary> which DOMPurify strips by default
DOMPurify.addHook('uponSanitizeElement', (node, data) => {
  if (data.tagName === 'details' || data.tagName === 'summary') {
    data.allowedTags[data.tagName] = true;
  }
});

function renderMarkdown(raw) {
  const html = marked.parse(raw);
  return DOMPurify.sanitize(html, {
    ADD_TAGS: ['details', 'summary'],
    ADD_ATTR: ['open'],
  });
}

  'ai-cli-en':       'AI CLI Tools',
  'ai-agents':       'AI Agents 生态',
  'ai-agents-en':    'AI Agents Ecosystem',
  'ai-web':          'OpenAI & Anthropic 官网动态',
  'ai-web-en':       'OpenAI & Anthropic Updates',
  'ai-trending':     'GitHub AI 趋势',

  'ai-hn':           'HN 社区动态',

  'ai-ph':           'Product Hunt AI',

  'ai-arxiv':        'ArXiv AI 研究',
  'ai-arxiv-en':     'ArXiv AI Research',

// ── Theme ──
const htmlEl = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('ar-theme') || 'dark';

const themeIcon = themeBtn.querySelector('.hdr-icon');
const themeLabel = themeBtn.querySelector('.hdr-label');

function applyTheme(t) {
  theme = t;
  htmlEl.dataset.theme = t;
  themeIcon.textContent = t === 'dark' ? '◐' : '●';
  themeLabel.textContent = t === 'dark' ? 'LIGHT' : 'DARK';
  localStorage.setItem('ar-theme', t);
}
applyTheme(theme);
themeBtn.onclick = () => applyTheme(theme === 'dark' ? 'light' : 'dark');

// ── Routing ──
function getHash() {
  const [date, report] = location.hash.slice(1).split('/');
  return /^\d{4}-\d{2}-\d{2}$/.test(date) && report ? { date, report } : null;
}

// ── State ──
let currentKey = null;
let searchIndex = null;
let searchReady = false;
let searchQuery = '';
let searchDebounce = null;

const searchInput = document.getElementById('searchInput');
const searchStatus = document.getElementById('searchStatus');

function setSearchStatus(text) {
  searchStatus.textContent = text || '';
}

function applyDateSearch(query) {
  const needle = query.trim().toLowerCase();
  let hits = 0;

  document.querySelectorAll('.date-group').forEach((grp) => {
    const hdr = grp.querySelector('.date-hdr');
    if (!hdr) return;

    if (!needle || !searchIndex) {
      hdr.classList.remove('search-hit');
      return;
    }

    const text = searchIndex.get(grp.dataset.date) || '';
    const matched = text.includes(needle);
    hdr.classList.toggle('search-hit', matched);
    if (matched) hits += 1;
  });

  if (!needle) {
    setSearchStatus('');
  } else if (!searchReady) {
    setSearchStatus('正在建立索引…');
  } else {
    setSearchStatus(`匹配 ${hits} 天`);
  }
}

async function buildSearchIndex(dates) {
  const index = new Map();
  await Promise.all(
    dates.map(async ({ date, reports }) => {
      const chunks = await Promise.all(
        reports.map(async (report) => {
          try {
            const res = await fetch(`./digests/${date}/${report}.md`);
            if (!res.ok) return '';
            return await res.text();
          } catch {
            return '';
          }
        })
      );
      index.set(date, chunks.join('\n').toLowerCase());
    })
  );
  return index;
}

function initSearch(dates) {
  searchReady = false;
  setSearchStatus('索引准备中…');

  buildSearchIndex(dates).then((index) => {
    searchIndex = index;
    searchReady = true;
    applyDateSearch(searchQuery);
    if (!searchQuery.trim()) setSearchStatus('');
  });
}

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => applyDateSearch(searchQuery), 120);
});

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

async function loadReport(date, report, push = true) {
  const key = `${date}/${report}`;
  if (key === currentKey) return;
  currentKey = key;

  if (push) history.pushState(null, '', `#${key}`);

  // Sync sidebar
  document.querySelectorAll('.rpt-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.date-hdr').forEach(h => {
    const grp = h.closest('.date-group');
    const hasActive = grp.querySelector('.rpt-btn.active') || grp.querySelector('.lang-btn.active');
    h.classList.toggle('lit', !!hasActive);
  });
  document.querySelectorAll('.month-hdr').forEach(h => {
    const mGrp = h.closest('.month-group');
    const hasActive = mGrp.querySelector('.lang-btn.active') || mGrp.querySelector('.rpt-btn.active');
    h.classList.toggle('lit', !!hasActive);
  });
  document.querySelectorAll('.date-group').forEach(g => {
    if (g.dataset.date === date) {
      g.classList.add('open');
      // Also open parent month group
      const monthGrp = g.closest('.month-group');
      if (monthGrp) monthGrp.classList.add('open');
    }
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  const cwrap = document.getElementById('cwrap');
  setContent('<div class="msg"><div class="msg-icon">⏳</div><div>Loading…</div></div>');
  cwrap.scrollTop = 0;

  try {
    const res = await fetch(`./digests/${date}/${report}.md`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.text();
    const safe = renderMarkdown(raw);
    setContent(`<div class="md fade">${safe}</div>`);
  } catch (e) {
    setContent(`<div class="msg"><div class="msg-icon">⚠️</div><div>加载失败：${e.message}</div></div>`);
  }
}

function buildDateGroup(date, reports, isFirst) {
  const grp = document.createElement('div');
  grp.className = 'date-group' + (isFirst ? ' open' : '');
  grp.dataset.date = date;

  const hdr = document.createElement('div');
  hdr.className = 'date-hdr';
  // Show only the day part (DD) since month is already in the parent header
  const dayLabel = date.slice(8); // "03" from "2026-04-03"
  const dateText = document.createTextNode(dayLabel + '\u00a0');
  const arrSpan = document.createElement('span');
  arrSpan.className = 'arr';
  arrSpan.textContent = '▶';
  hdr.appendChild(dateText);
  hdr.appendChild(arrSpan);
  hdr.onclick = () => grp.classList.toggle('open');

  const list = document.createElement('div');
  list.className = 'rpt-list';

  const baseReports = reports.filter(r => !r.endsWith('-en'));
  baseReports.forEach(r => {
    const enKey = r + '-en';
    const hasEn = reports.includes(enKey);

    if (hasEn) {
      const row = document.createElement('div');
      row.className = 'rpt-row';

      const label = document.createElement('span');
      label.className = 'rpt-label';
      const baseLabel = LABELS[r] || r;
      label.textContent = baseLabel;
      label.title = baseLabel;

      const btns = document.createElement('div');
      btns.className = 'lang-btns';

      const zhBtn = document.createElement('button');
      zhBtn.className = 'lang-btn';
      zhBtn.dataset.key = `${date}/${r}`;
      zhBtn.textContent = 'ZH';
      zhBtn.onclick = () => loadReport(date, r);

      const enBtn = document.createElement('button');
      enBtn.className = 'lang-btn';
      enBtn.dataset.key = `${date}/${enKey}`;
      enBtn.textContent = 'EN';
      enBtn.onclick = () => loadReport(date, enKey);

      btns.append(zhBtn, enBtn);
      row.append(label, btns);
      list.appendChild(row);
    } else {
      const btn = document.createElement('button');
      btn.className = 'rpt-btn';
      btn.dataset.key = `${date}/${r}`;
      btn.textContent = LABELS[r] || r;
      btn.onclick = () => loadReport(date, r);
      list.appendChild(btn);
    }
  });

  grp.append(hdr, list);
  return grp;
}

function buildNav(dates) {
  const nav = document.getElementById('nav');

  // Group dates by month (YYYY-MM)
  const months = new Map();
  dates.forEach((entry) => {
    const month = entry.date.slice(0, 7); // "2026-04"
    if (!months.has(month)) months.set(month, []);
    months.get(month).push(entry);
  });

  let isFirstDate = true;
  let isFirstMonth = true;
  months.forEach((entries, month) => {
    const mGrp = document.createElement('div');
    mGrp.className = 'month-group' + (isFirstMonth ? ' open' : '');

    const mHdr = document.createElement('div');
    mHdr.className = 'month-hdr';
    const mText = document.createTextNode(month + '\u00a0');
    const mArr = document.createElement('span');
    mArr.className = 'arr';
    mArr.textContent = '▶';
    mHdr.appendChild(mText);
    mHdr.appendChild(mArr);
    mHdr.onclick = () => mGrp.classList.toggle('open');

    const mBody = document.createElement('div');
    mBody.className = 'month-body';

    entries.forEach(({ date, reports }) => {
      mBody.appendChild(buildDateGroup(date, reports, isFirstDate));
      isFirstDate = false;
    });

    mGrp.append(mHdr, mBody);
    nav.appendChild(mGrp);
    isFirstMonth = false;
  });
}

window.addEventListener('popstate', () => {
  const h = getHash();
  if (h) loadReport(h.date, h.report, false);
});

// ── Init ──
(async () => {
  try {
    const res = await fetch('./manifest.json');
    if (!res.ok) throw new Error('manifest.json not found');
    const { dates } = await res.json();
    if (!dates?.length) throw new Error('manifest is empty');

    buildNav(dates);
    initSearch(dates);

    const hash = getHash();
    const first = dates[0];
    if (hash && dates.find(d => d.date === hash.date && d.reports.includes(hash.report))) {
      loadReport(hash.date, hash.report, false);
    } else if (first?.reports?.length) {
      const r0 = first.reports[0];
      history.replaceState(null, '', `#${first.date}/${r0}`);
      loadReport(first.date, r0, false);
    }
  } catch (e) {
    document.getElementById('nav').innerHTML =
      '<div class="msg" style="height:80px;font-size:10px">⚠️ ' + e.message + '</div>';
    setContent('<div class="msg"><div class="msg-icon">📡</div><div>无法加载 manifest.json</div></div>');
  }
})();

// ── Chat Agent ──

// MCP Worker URL — update this to your deployed Worker URL
const CHAT_API_URL = 'https://ai-topic-radar-mcp.your-subdomain.workers.dev/chat';
// For local dev: 'http://localhost:8787/chat'

let chatHistory = [];
let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').classList.toggle('open', chatOpen);
  document.getElementById('chatOverlay').classList.toggle('open', chatOpen);
  document.getElementById('chatBtn').classList.toggle('chat-active', chatOpen);
  if (chatOpen) {
    setTimeout(() => document.getElementById('chatInput').focus(), 300);
  }
}

function sendSuggestion(el) {
  const text = el.textContent;
  document.getElementById('chatInput').value = text;
  sendChatMessage();
}

function appendChatMessage(role, content, citations) {
  const container = document.getElementById('chatMessages');
  // Remove welcome message if present
  const welcome = container.querySelector('.chat-welcome');
  if (welcome) welcome.remove();

  // Remove typing indicator
  const typing = container.querySelector('.chat-typing');
  if (typing) typing.remove();

  const msg = document.createElement('div');
  msg.className = `chat-msg ${role} fade`;

  if (role === 'assistant') {
    const mdDiv = document.createElement('div');
    mdDiv.className = 'md';
    mdDiv.innerHTML = renderMarkdown(content);
    msg.appendChild(mdDiv);

    // Add citations
    if (citations && citations.length > 0) {
      const citDiv = document.createElement('div');
      citDiv.className = 'chat-citations';
      citDiv.innerHTML = '<div class="cit-label">📚 参考来源</div>';
      citations.forEach((c) => {
        const link = document.createElement('a');
        link.className = 'chat-cit-link';
        link.textContent = `${c.date} · ${c.source}`;
        link.title = c.excerpt || '';
        link.href = `#${c.date}/${c.source}`;
        link.onclick = (e) => {
          e.preventDefault();
          toggleChat(); // close chat panel
          loadReport(c.date, c.source);
        };
        citDiv.appendChild(link);
      });
      msg.appendChild(citDiv);
    }
  } else {
    msg.textContent = content;
  }

  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function showTypingIndicator() {
  const container = document.getElementById('chatMessages');
  const typing = document.createElement('div');
  typing.className = 'chat-typing';
  typing.innerHTML = '思考中<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  const sendBtn = document.getElementById('chatSend');

  // Clear input and disable
  input.value = '';
  sendBtn.disabled = true;

  // Show user message
  appendChatMessage('user', message);
  chatHistory.push({ role: 'user', content: message });

  // Show typing indicator
  showTypingIndicator();

  try {
    const res = await fetch(CHAT_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        history: chatHistory.slice(0, -1), // exclude current user message (already in message field)
      }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${res.status}`);
    }

    const data = await res.json();

    // Show assistant response
    appendChatMessage('assistant', data.answer, data.citations);
    chatHistory.push({ role: 'assistant', content: data.answer });
  } catch (e) {
    const errorMsg = `请求失败：${e.message}\n\n请确认 MCP Worker 已部署且 LLM 环境变量已配置。`;
    appendChatMessage('assistant', errorMsg, []);
    // Remove the failed user message from history
    chatHistory.pop();
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
